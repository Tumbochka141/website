<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eulennest</title>
    <link rel="icon" type="image/png" href="img/gashich.png">
    <link rel="shortcut icon" type="image/png" href="img/gashich.png">
    <link rel="stylesheet" href="caine.css">
    <script src="generator.js" defer></script>
</head>
<body class="is-night">
    <main class="main">
        <aside class="main__sidebar" aria-hidden="true"></aside>
        <header class="header">
            <a href="#" class="logo" aria-label="Eulennest">
                <img src="img/gashich.png" alt="">
                <span>Eulennest</span>
            </a>
            <nav class="nav">
                <a href="#">Гнездо</a>
                <a href="#">Игры</a>
                <a href="#">Вечер</a>
            </nav>
            <div class="actions">
                <button class="day-night-toggle" type="button" aria-label="Включить ночной режим" aria-pressed="false">
                    <span class="day-night-toggle__sky" aria-hidden="true">
                        <span class="day-night-toggle__moon"></span>
                        <span class="day-night-toggle__orbit day-night-toggle__orbit--outer">
                            <span class="day-night-toggle__sun day-night-toggle__sun--large"></span>
                        </span>
                        <span class="day-night-toggle__orbit day-night-toggle__orbit--inner">
                            <span class="day-night-toggle__sun day-night-toggle__sun--small"></span>
                        </span>
                        <span class="day-night-toggle__cloud day-night-toggle__cloud--left"></span>
                        <span class="day-night-toggle__cloud day-night-toggle__cloud--right"></span>
                        <span class="day-night-toggle__main-sun">☀</span>
                        <img class="day-night-toggle__owl" src="img/night-gray-owl-branch.png" alt="">
                        <img class="day-night-toggle__sleeping-owl" src="img/sleeping-gray-owl-branch.png" alt="">
                        <span class="day-night-toggle__sleep">Zzz</span>
                    </span>
                    <span class="day-night-toggle__label">NIGHT MODE</span>
                </button>
            </div>
        </header>
        <section class="main__content">
            <div class="gallery-grid">
                <a href="catalog.html" class="gallery-item gallery-item--link" aria-label="Открыть каталог игр">
                    <div class="gallery-item-image-wrap">
                        <img src="img/huli.png" alt="Пейзаж 1" class="gallery-img">
                    </div>
                    <div class="gallery-caption">
                        <h4>Не можешь чего-то найти?</h4>
                        <p>Тут не только 3 игры если что</p>
                    </div>
                </a>

                <div class="gallery-item">
                    <div class="gallery-item-image-wrap">
                        <img src="img/monopoly.png" alt="Пейзаж 2" class="gallery-img">
                    </div>
                    <div class="gallery-caption">
                        <h4>Монополия</h4>
                        <p>Ну давай, скажи что у тебя крепкая дружба</p>
                    </div>
                </div>

                <div class="gallery-item">
                    <div class="gallery-item-image-wrap">
                        <img src="img/mafia.png" alt="Пейзаж 3" class="gallery-img">
                    </div>
                    <div class="gallery-caption">
                        <h4>Мафия</h4>
                        <p>10 путан из 10</p>
                    </div>
                </div>

                <div class="gallery-item">
                    <div class="gallery-item-image-wrap">
                        <img src="img/bunker.jpg" alt="Бункер" class="gallery-img">
                    </div>
                    <div class="gallery-caption">
                        <h4>Бункер</h4>
                        <p>Сборище уродцев</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
