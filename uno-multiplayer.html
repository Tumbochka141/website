<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Online — Eulennest</title>
    <link rel="icon" href="img/gashich.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Unbounded:wght@600;700;800&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="uno-multiplayer.css">
    <style>
        .board.my-turn {
            border-color: rgba(255, 232, 120, .92);
            box-shadow: 0 0 0 3px rgba(255, 232, 120, .08), 0 0 36px rgba(255, 221, 87, .16), 0 24px 55px rgba(2, 15, 31, .25);
        }
        .board.my-turn .status { color: var(--wine); background: var(--bright); font-weight: 800; }
        .board.my-turn .card.playable { animation: online-playable 1.7s ease-in-out infinite; }
        @keyframes online-playable {
            50% { box-shadow: 0 0 0 3px var(--bright), 0 0 20px rgba(255, 232, 120, .54); }
        }
    </style>
    <script>
        if (location.protocol === "file:") {
            addEventListener("DOMContentLoaded", () => {
                const notice = document.querySelector("#config-notice");
                notice.hidden = false;
                notice.querySelector("p").innerHTML = "Модули мультиплеера требуют локальный сервер. Запусти в папке сайта <code>python -m http.server 8000</code> и открой <code>http://localhost:8000/uno-multiplayer.html</code>.";
                document.querySelector("#connection-label").textContent = "Нужен локальный сервер";
                document.querySelector("#create-room").disabled = true;
                document.querySelector("#join-room").disabled = true;
            });
        }
    </script>
    <script type="module" src="uno-multiplayer.js"></script>
</head>
<body>
    <header class="site-header">
        <a class="header-back" href="catalog.html">← <span>Назад к каталогу</span></a>
        <nav><a href="index.html">Гнездо</a><a class="active" href="catalog.html">Игры</a><a href="https://discord.gg/reRVVvXVa9">Вечер</a></nav>
    </header>

    <main class="page">
        <div class="title-row"><h1>UNO <span>ONLINE</span></h1><p id="connection-label">Подключение…</p></div>

        <section class="notice" id="config-notice" hidden>
            <strong>Нужно подключить Firebase</strong>
            <p>Вставь конфигурацию проекта в <code>firebase-config.js</code>, включи Anonymous Authentication и Realtime Database.</p>
        </section>

        <section class="lobby" id="entry-panel">
            <div class="lobby-card">
                <p class="kicker">Твоё имя</p>
                <input id="player-name" maxlength="24" value="Совёнок" autocomplete="nickname">
            </div>
            <div class="lobby-card">
                <p class="kicker">Новое гнездо</p>
                <label>Мест <select id="room-size"><option>2</option><option selected>3</option><option>4</option></select></label>
                <button id="create-room">Создать комнату</button>
            </div>
            <div class="lobby-card">
                <p class="kicker">Войти по коду</p>
                <input id="room-code-input" maxlength="6" placeholder="ABC234" autocomplete="off">
                <button id="join-room">Войти</button>
            </div>
        </section>

        <section class="room" id="room-panel" hidden>
            <div class="room-bar">
                <div><span>Код комнаты</span><button class="room-code" id="room-code" title="Скопировать код">——</button></div>
                <div class="room-actions"><button id="start-game">Начать игру</button><button class="ghost" id="leave-room">Выйти</button></div>
            </div>
            <div class="players" id="players"></div>
        </section>

        <section class="board" id="game-panel" hidden>
            <div class="opponents" id="opponents"></div>
            <p class="status" id="game-status">Ожидание…</p>
            <div class="center">
                <button class="card back" id="draw-card"><span>UNO</span></button>
                <div id="top-card"></div>
            </div>
            <div class="controls"><button id="call-uno">Крикнуть UNO!</button></div>
            <div class="hand" id="hand"></div>
        </section>
        <p class="error" id="error" role="alert"></p>
    </main>

    <dialog id="color-dialog"><h2>Выбери цвет</h2><div class="colors"><button data-color="Красный"></button><button data-color="Желтый"></button><button data-color="Зеленый"></button><button data-color="Синий"></button></div></dialog>
</body>
</html>
