<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO — Eulennest</title>
    <link rel="icon" type="image/png" href="img/gashich.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Unbounded:wght@600;700;800&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="uno-shell.css">
    <link rel="stylesheet" href="styles/shared/nav-cassette.css">
</head>
<body>
    <div class="uno-backdrop-decor" aria-hidden="true">
        <span class="uno-backdrop-card uno-backdrop-card--one">+4</span>
        <span class="uno-backdrop-card uno-backdrop-card--two">↻</span>
        <span class="uno-backdrop-ring uno-backdrop-ring--one"></span>
        <span class="uno-backdrop-ring uno-backdrop-ring--two"></span>
    </div>
    <header class="site-header">
        <div class="header-inner">
            <a class="header-back" href="catalog.html" aria-label="Назад к каталогу">←</a>
            <div class="header-game">
                <span>Карточная игра</span>
                <h1>UNO</h1>
            </div>
            <nav class="site-nav" aria-label="Основная навигация">
                <a href="index.html">Гнездо</a>
                <a class="is-active" href="catalog.html" aria-current="page">Игры</a>
                <a href="https://discord.gg/reRVVvXVa9" target="_blank" rel="noopener noreferrer">Вечер</a>
            </nav>
            <button class="uno-theme-toggle" type="button" aria-label="Включить светлую тему" aria-pressed="false">
                <span class="uno-theme-toggle__scene" aria-hidden="true">
                    <span class="uno-theme-toggle__sun">☀</span>
                    <span class="uno-theme-toggle__moon"></span>
                    <img class="uno-theme-toggle__owl" src="img/night-gray-owl-branch.png" alt="">
                    <img class="uno-theme-toggle__sleeping-owl" src="img/sleeping-gray-owl-branch.png" alt="">
                    <span class="uno-theme-toggle__sleep">Zzz</span>
                </span>
                <span class="uno-theme-toggle__label">Ночь</span>
            </button>
        </div>
    </header>

    <main class="uno-page">
        <div class="game-heading">
            <div class="setup online-entry online-only" id="online-entry" aria-label="Подключение к сетевой игре">
                <label class="setup-field" for="online-name">
                    <span>Твоё имя</span>
                    <input id="online-name" maxlength="24" value="Совёнок" autocomplete="nickname">
                </label>
                <button class="control-button control-button--gold" id="online-create" type="button">Создать комнату</button>
                <label class="setup-field" for="online-code-input">
                    <span>Код комнаты</span>
                    <input id="online-code-input" maxlength="6" placeholder="ABC234" autocomplete="off">
                </label>
                <button class="control-button" id="online-join" type="button">Войти</button>
            </div>
        </div>

        <section class="online-room online-only" id="online-room" hidden aria-label="Сетевая комната">
            <div>Код: <button class="room-code" id="online-code" type="button" title="Скопировать код">——</button></div>
            <div class="online-players" id="online-players"></div>
            <div class="online-actions">
                <button class="control-button control-button--gold" id="online-start" type="button">Начать игру</button>
                <button class="control-button" id="online-leave" type="button">Выйти</button>
            </div>
        </section>
        <p class="online-error online-only" id="online-error" role="alert"></p>

        <section class="game-board" aria-label="Игровой стол UNO">
            <div class="game-board__ornament" aria-hidden="true"></div>
            <div class="opponents" id="opponents" aria-label="Соперники"></div>
            <p class="turn-indicator" id="status" aria-live="polite">
                <span class="direction-indicator" id="direction-indicator" aria-label="Направление по часовой стрелке">↻</span>
                <span class="status-text" id="status-text">Начать партию</span>
                <span class="current-color" id="current-color" aria-label="Текущий цвет не выбран"></span>
            </p>

            <div class="table-center">
                <div class="pile">
                    <button class="pile-button" id="draw-pile" type="button" aria-label="Взять карту из колоды" disabled>
                        <span class="uno-card uno-card--back"><span class="uno-card__value">UNO</span></span>
                    </button>
                    <span class="deck-count" id="deck-count">0</span>
                </div>
                <div class="pile" id="discard-pile" aria-label="Верхняя карта сброса"></div>
            </div>

            <div class="player-zone">
                <div class="player-controls">
                    <button class="control-button" id="uno-call" type="button" disabled>Крикнуть UNO!</button>
                    <button class="control-button" id="pass-turn" type="button" disabled>Закончить ход</button>
                    <button class="control-button control-button--gold" id="reveal-hand" type="button" hidden>Показать карты</button>
                </div>
                <div class="player-hand" id="player-hand" aria-label="Твои карты"></div>
            </div>
        </section>
    </main>

    <dialog class="color-dialog" id="color-dialog">
        <h2>Выбери новый цвет</h2>
        <div class="color-options">
            <button class="color-choice" type="button" data-color="red" aria-label="Красный"></button>
            <button class="color-choice" type="button" data-color="yellow" aria-label="Жёлтый"></button>
            <button class="color-choice" type="button" data-color="green" aria-label="Зелёный"></button>
            <button class="color-choice" type="button" data-color="blue" aria-label="Синий"></button>
        </div>
    </dialog>
    <dialog class="game-alert" id="game-alert" aria-describedby="game-alert-message">
        <div class="game-alert__mark" aria-hidden="true">!</div>
        <p class="game-alert__message" id="game-alert-message"></p>
        <div class="game-alert__actions">
            <button class="control-button" id="game-alert-cancel" type="button">Отмена</button>
            <button class="control-button control-button--gold" id="game-alert-ok" type="button">Понятно</button>
        </div>
    </dialog>
    <script src="uno-dialog.js"></script>
    <script src="discord-config.js"></script>
    <script src="discord-profile.js"></script>
    <script src="data/uno/theme.js"></script>
    <script src="data/uno/bootstrap.js"></script>
</body>
</html>
