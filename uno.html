<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO — Eulennest</title>
    <link rel="icon" type="image/png" href="img/gashich.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Unbounded:wght@600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f5efe4;
            --cream-muted: #cfc2ac;
            --wine: #3b101c;
            --gold: #d6b751;
            --gold-bright: #ffe878;
            --navy-950: #071c2e;
            --navy-900: #0b2942;
            --navy-800: #174a70;
            --red: #d83a34;
            --yellow: #e9b82f;
            --green: #3c9652;
            --blue: #3478b9;
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--cream);
            font-family: "Cormorant Garamond", Georgia, serif;
            background:
                radial-gradient(circle at 50% 25%, rgba(42, 105, 146, .42), transparent 42%),
                linear-gradient(145deg, var(--navy-900), var(--navy-950));
        }

        button, select { font: inherit; }

        .site-header {
            min-height: 66px;
            display: grid;
            place-items: center;
            padding: 0 24px;
            background: rgba(245, 239, 228, .97);
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 8px 24px rgba(3, 17, 29, .22);
        }

        .site-nav { display: flex; gap: clamp(22px, 5vw, 54px); }

        .site-nav a {
            padding: 23px 4px 18px;
            color: var(--wine);
            border-bottom: 3px solid transparent;
            font-family: Cinzel, Georgia, serif;
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .16em;
            text-decoration: none;
            text-transform: uppercase;
            opacity: .58;
        }

        .site-nav a:hover,
        .site-nav a:focus-visible,
        .site-nav a.is-active { opacity: 1; border-bottom-color: var(--gold); }

        .uno-page {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 56px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 18px;
            color: var(--gold-bright);
            font-family: Cinzel, Georgia, serif;
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-decoration: none;
            text-transform: uppercase;
        }

        .game-heading {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 18px;
        }

        .game-heading p, .game-heading h1 { margin: 0; }
        .eyebrow { color: var(--gold); font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
        .game-heading h1 { font: 700 clamp(2.2rem, 7vw, 4.6rem)/.95 Cinzel, Georgia, serif; }
        .game-heading__copy { max-width: 510px; color: var(--cream-muted); font-size: 1.08rem; }

        .setup {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border: 1px solid rgba(214, 183, 81, .35);
            border-radius: 12px;
            background: rgba(7, 28, 46, .8);
        }

        .setup label { color: var(--cream-muted); font-weight: 700; }
        .setup select, .control-button {
            min-height: 40px;
            border: 1px solid rgba(214, 183, 81, .55);
            border-radius: 8px;
            color: var(--cream);
            background: var(--navy-900);
            cursor: pointer;
        }

        .setup select { padding: 0 34px 0 12px; }
        .control-button { padding: 0 16px; font-family: Cinzel, Georgia, serif; font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
        .control-button:hover, .control-button:focus-visible { border-color: var(--gold-bright); outline: none; }
        .control-button--gold { color: var(--wine); background: var(--gold-bright); }
        .control-button:disabled { cursor: not-allowed; opacity: .4; }

        .game-board {
            position: relative;
            min-height: 650px;
            overflow: hidden;
            padding: 22px;
            border: 1px solid rgba(214, 183, 81, .42);
            border-radius: 22px;
            background:
                linear-gradient(rgba(11, 41, 66, .55), rgba(7, 28, 46, .72)),
                repeating-linear-gradient(35deg, transparent 0 22px, rgba(255, 255, 255, .018) 23px 24px);
            box-shadow: 0 22px 55px rgba(0, 0, 0, .3), inset 0 0 55px rgba(0, 0, 0, .2);
        }

        .opponents {
            min-height: 98px;
            display: flex;
            justify-content: center;
            gap: clamp(14px, 5vw, 68px);
        }

        .opponent {
            min-width: 118px;
            padding: 10px 14px;
            text-align: center;
            border: 1px solid rgba(245, 239, 228, .12);
            border-radius: 12px;
            background: rgba(7, 28, 46, .7);
        }

        .opponent.is-active { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(214, 183, 81, .12); }
        .opponent strong, .opponent span { display: block; }
        .opponent span { color: var(--cream-muted); }

        .table-center {
            min-height: 310px;
            display: grid;
            grid-template-columns: 104px 104px;
            place-content: center;
            gap: 28px;
        }

        .pile { position: relative; width: 96px; height: 140px; }
        .pile-button { width: 100%; height: 100%; padding: 0; border: 0; border-radius: 12px; background: none; cursor: pointer; }
        .pile-button:focus-visible { outline: 3px solid var(--gold-bright); outline-offset: 5px; }
        .deck-count { position: absolute; right: -10px; bottom: -10px; min-width: 30px; padding: 5px 7px; border-radius: 999px; color: var(--wine); background: var(--gold-bright); font-weight: 700; text-align: center; }

        .uno-card {
            --card-color: #191c26;
            position: relative;
            width: 88px;
            height: 132px;
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            padding: 0;
            overflow: hidden;
            color: white;
            border: 5px solid #f6f0df;
            border-radius: 12px;
            background: var(--card-color);
            box-shadow: 0 6px 14px rgba(0, 0, 0, .34);
            font: 700 2rem/1 Cinzel, Georgia, serif;
        }

        button.uno-card { cursor: pointer; transition: transform .16s ease, filter .16s ease; }
        button.uno-card:hover, button.uno-card:focus-visible { z-index: 3; transform: translateY(-14px) rotate(-1deg); filter: brightness(1.08); outline: none; }
        button.uno-card:disabled { cursor: not-allowed; filter: saturate(.55) brightness(.72); }
        .uno-card::before { content: ""; position: absolute; width: 62px; height: 104px; border: 2px solid rgba(255,255,255,.9); border-radius: 50%; transform: rotate(24deg); }
        .uno-card__value { position: relative; z-index: 1; text-shadow: 0 2px 2px rgba(0, 0, 0, .4); }
        .uno-card--red { --card-color: var(--red); }
        .uno-card--yellow { --card-color: var(--yellow); color: #172033; }
        .uno-card--green { --card-color: var(--green); }
        .uno-card--blue { --card-color: var(--blue); }
        .uno-card--wild { background: conic-gradient(var(--red) 0 25%, var(--yellow) 0 50%, var(--green) 0 75%, var(--blue) 0); }
        .uno-card--back { background: #1c2130; }
        .uno-card--back .uno-card__value { color: var(--gold-bright); font-size: 1rem; transform: rotate(-24deg); }

        .turn-indicator {
            position: absolute;
            top: 132px;
            left: 50%;
            transform: translateX(-50%);
            min-width: min(430px, calc(100% - 32px));
            padding: 8px 14px;
            border-radius: 999px;
            color: var(--cream);
            background: rgba(7, 28, 46, .88);
            text-align: center;
        }

        .current-color { display: inline-block; width: 12px; height: 12px; margin-left: 6px; border: 2px solid white; border-radius: 50%; vertical-align: -1px; }

        .player-zone { border-top: 1px solid rgba(214, 183, 81, .2); padding-top: 14px; }
        .player-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 14px; }
        .player-hand { min-height: 146px; display: flex; justify-content: center; align-items: end; gap: 0; padding: 12px 12px 4px; overflow-x: auto; }
        .player-hand .uno-card + .uno-card { margin-left: -22px; }
        .player-hand .uno-card.is-playable { box-shadow: 0 0 0 2px var(--gold-bright), 0 6px 14px rgba(0,0,0,.34); }
        .player-hand .uno-card.is-drawn { z-index: 2; transform: translateY(-8px); }

        .color-dialog { border: 1px solid var(--gold); border-radius: 16px; color: var(--cream); background: var(--navy-950); box-shadow: 0 20px 60px rgba(0,0,0,.55); }
        .color-dialog::backdrop { background: rgba(0, 0, 0, .65); }
        .color-dialog h2 { margin: 0 0 18px; font: 700 1rem Cinzel, Georgia, serif; }
        .color-options { display: grid; grid-template-columns: repeat(4, 58px); gap: 10px; }
        .color-choice { width: 58px; height: 58px; border: 4px solid var(--cream); border-radius: 50%; cursor: pointer; }
        .color-choice:hover, .color-choice:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }

        @media (max-width: 720px) {
            .game-heading { align-items: stretch; flex-direction: column; }
            .setup { flex-wrap: wrap; }
            .game-board { min-height: 610px; padding: 14px 8px; }
            .opponents { gap: 7px; }
            .opponent { min-width: 86px; padding: 8px; }
            .table-center { min-height: 290px; gap: 16px; }
            .uno-card { width: 74px; height: 112px; font-size: 1.6rem; }
            .player-hand .uno-card + .uno-card { margin-left: -28px; }
            .turn-indicator { top: 118px; font-size: .92rem; }
        }

        /* Общий визуальный язык Eulennest. */
        :root {
            --font-body: "Manrope", system-ui, sans-serif;
            --font-display: "Unbounded", "Trebuchet MS", sans-serif;
        }

        body {
            position: relative;
            font-family: var(--font-body);
            background:
                linear-gradient(90deg, rgba(59, 16, 28, .98) 0 4vw, transparent 4vw),
                radial-gradient(circle at 50% 25%, rgba(42, 105, 146, .46), transparent 42%),
                linear-gradient(145deg, var(--navy-900), var(--navy-950));
        }

        .site-header {
            position: relative;
            width: min(1180px, calc(100% - 72px));
            min-height: 76px;
            margin: 22px auto 0;
            border: 1px solid rgba(255, 232, 120, .7);
            border-bottom-width: 3px;
            border-radius: 15px;
            box-shadow: 0 18px 45px rgba(2, 16, 29, .24);
        }

        .site-nav a,
        .back-link,
        .eyebrow,
        .game-heading h1,
        .setup-field span,
        .setup-summary,
        .control-button,
        .opponent strong,
        .color-dialog h2 {
            font-family: var(--font-display);
        }

        .site-nav a { color: #173858; letter-spacing: .025em; }
        .header-back {
            position: absolute;
            left: 24px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--wine);
            font: 700 .68rem var(--font-display);
            letter-spacing: .035em;
            text-decoration: none;
            opacity: .68;
            transition: color .2s ease, opacity .2s ease, transform .2s ease;
        }

        .header-back:hover,
        .header-back:focus-visible {
            color: #173858;
            opacity: 1;
            transform: translateX(-3px);
        }
        .game-heading h1 { font-size: clamp(2.2rem, 7vw, 4.6rem); letter-spacing: -.045em; }
        .game-heading { align-items: center; }
        .game-heading > div:first-child { padding-left: clamp(18px, 2.6vw, 38px); }

        .mode-switch {
            display: flex;
            gap: 5px;
            width: max-content;
            margin-top: 11px;
            padding: 4px;
            border: 1px solid rgba(214, 183, 81, .32);
            border-radius: 999px;
            background: rgba(7, 28, 46, .72);
        }

        .mode-switch a {
            padding: 7px 11px;
            border-radius: 999px;
            color: var(--cream-muted);
            font: 700 .55rem var(--font-display);
            letter-spacing: .035em;
            text-decoration: none;
            text-transform: uppercase;
        }

        html:not(.online-mode) .mode-local,
        html.online-mode .mode-online { color: var(--wine); background: var(--gold-bright); }
        html:not(.online-mode) .online-only,
        html.online-mode .local-only { display: none !important; }
        [hidden] { display: none !important; }

        .setup {
            display: grid;
            grid-template-columns: repeat(2, minmax(112px, 1fr)) auto;
            gap: 10px;
            min-width: min(100%, 470px);
            padding: 13px;
            border-color: rgba(255, 232, 120, .48);
            background: linear-gradient(145deg, rgba(76, 18, 36, .94), rgba(40, 11, 25, .94));
            box-shadow: 0 14px 32px rgba(2, 16, 29, .24);
        }

        .setup-field { display: grid; gap: 6px; }
        .setup-field span { color: var(--gold-bright); font-size: .56rem; letter-spacing: .035em; }
        .setup select { width: 100%; min-height: 42px; }
        .setup input {
            width: 100%;
            min-height: 42px;
            padding: 0 12px;
            border: 1px solid rgba(214, 183, 81, .55);
            border-radius: 8px;
            color: var(--cream);
            background: var(--navy-900);
            font: 600 .78rem var(--font-body);
        }
        .setup input:focus { border-color: var(--gold-bright); outline: none; }
        .setup .control-button { align-self: end; }
        .setup-summary { grid-column: 1 / -1; color: var(--cream-muted); font-size: .56rem; letter-spacing: .025em; }

        .online-entry {
            grid-template-columns: minmax(130px, 1fr) auto minmax(120px, .8fr) auto;
            min-width: min(100%, 660px);
        }

        .online-room {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
            padding: 12px 15px;
            border: 1px solid rgba(255, 232, 120, .42);
            border-radius: 14px;
            background: linear-gradient(145deg, rgba(76, 18, 36, .94), rgba(40, 11, 25, .94));
        }

        .room-code {
            color: var(--gold-bright);
            border: 0;
            background: none;
            cursor: pointer;
            font: 800 1.05rem var(--font-display);
            letter-spacing: .12em;
        }

        .online-players { display: flex; flex-wrap: wrap; gap: 7px; }
        .online-player { padding: 7px 10px; border-radius: 999px; color: var(--cream); background: rgba(7, 28, 46, .76); font-size: .72rem; }
        .online-player.is-host::after { content: " · ведущий"; color: var(--gold); }
        .online-actions { display: flex; gap: 8px; }
        .online-error { min-height: 22px; margin: -4px 0 8px; color: #ffb9b9; text-align: right; }

        .game-board::before,
        .game-board::after {
            content: "";
            position: absolute;
            top: 15px;
            width: 26px;
            height: 26px;
            pointer-events: none;
            border-top: 2px solid var(--gold);
        }

        .game-board::before { left: 15px; border-left: 2px solid var(--gold); }
        .game-board::after { right: 15px; border-right: 2px solid var(--gold); }
        .game-board.is-my-turn {
            border-color: rgba(255, 232, 120, .92);
            box-shadow:
                0 0 0 3px rgba(255, 232, 120, .08),
                0 0 34px rgba(255, 221, 87, .14),
                0 22px 55px rgba(0, 0, 0, .3),
                inset 0 0 55px rgba(0, 0, 0, .2);
        }

        .game-board.is-my-turn .turn-indicator {
            color: var(--wine);
            background: var(--gold-bright);
            font-weight: 800;
        }

        .game-board.is-my-turn .player-hand .uno-card.is-playable {
            animation: playable-pulse 1.7s ease-in-out infinite;
        }

        @keyframes playable-pulse {
            50% { box-shadow: 0 0 0 3px var(--gold-bright), 0 0 18px rgba(255, 232, 120, .5); }
        }
        .opponent { background: linear-gradient(145deg, rgba(78, 19, 38, .82), rgba(34, 12, 25, .85)); }
        .opponent.is-human::after { content: "ИГРОК"; display: block; margin-top: 4px; color: var(--gold); font: 700 .48rem var(--font-display); }
        .opponent.is-bot::after { content: "БОТ"; display: block; margin-top: 4px; color: var(--cream-muted); font: 700 .48rem var(--font-display); }

        .hand-cover {
            min-height: 132px;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--cream-muted);
            text-align: center;
            border: 1px dashed rgba(214, 183, 81, .42);
            border-radius: 14px;
            background: rgba(7, 28, 46, .72);
        }

        .control-button:not(.control-button--gold) { background: linear-gradient(145deg, #541527, var(--wine)); }

        @media (max-width: 720px) {
            body {
                background:
                    linear-gradient(90deg, rgba(59, 16, 28, .98) 0 14px, transparent 14px),
                    radial-gradient(circle at 50% 25%, rgba(42, 105, 146, .46), transparent 42%),
                    linear-gradient(145deg, var(--navy-900), var(--navy-950));
            }

            .site-header { width: calc(100% - 28px); margin-top: 12px; }
            .header-back { left: 16px; }
            .header-back span { display: none; }
            .game-heading { align-items: stretch; }
            .game-heading > div:first-child { padding-left: 0; }
            .setup { grid-template-columns: repeat(2, minmax(0, 1fr)); min-width: 0; }
            .setup .control-button { grid-column: 1 / -1; }
            .online-entry { grid-template-columns: 1fr 1fr; }
            .online-entry .control-button { grid-column: auto; }
            .online-room { grid-template-columns: 1fr; }
            .online-actions { flex-wrap: wrap; }
        }
    </style>
    <script>document.documentElement.classList.toggle("online-mode", new URLSearchParams(location.search).get("mode") === "online");</script>
</head>
<body>
    <header class="site-header">
        <a class="header-back" href="catalog.html" aria-label="Назад к каталогу">← <span>Назад к каталогу</span></a>
        <nav class="site-nav" aria-label="Основная навигация">
            <a href="index.html">Гнездо</a>
            <a class="is-active" href="catalog.html" aria-current="page">Игры</a>
            <a href="https://discord.gg/reRVVvXVa9" target="_blank" rel="noopener noreferrer">Вечер</a>
        </nav>
    </header>

    <main class="uno-page">
        <div class="game-heading">
            <div>
                <h1>UNO</h1>
                <nav class="mode-switch" aria-label="Режим игры">
                    <a class="mode-local" href="uno.html">За одним столом</a>
                    <a class="mode-online" href="uno.html?mode=online">По сети</a>
                </nav>
            </div>
            <div class="setup local-only" aria-label="Настройка участников">
                <label class="setup-field" for="player-count">
                    <span>Всего мест</span>
                    <select id="player-count">
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                        <option value="4">4</option>
                    </select>
                </label>
                <label class="setup-field" for="human-count">
                    <span>Живых игроков</span>
                    <select id="human-count">
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </label>
                <button class="control-button control-button--gold" id="new-game" type="button">Новая партия</button>
                <span class="setup-summary" id="setup-summary">1 игрок · 2 бота</span>
            </div>
            <div class="setup online-entry online-only" id="online-entry" aria-label="Подключение к сетевой игре">
                <label class="setup-field" for="online-name">
                    <span>Твоё имя</span>
                    <input id="online-name" maxlength="24" value="Совёнок" autocomplete="nickname">
                </label>
                <button class="control-button control-button--gold" id="online-create" type="button">Создать комнату</button>
                <label class="setup-field" for="online-code-input">
                    <span>Код комнаты</span>
                    <input id="online-code-input" maxlength="6" placeholder="ABC234" autocomplete="off">
                </label>
                <button class="control-button" id="online-join" type="button">Войти</button>
            </div>
        </div>

        <section class="online-room online-only" id="online-room" hidden aria-label="Сетевая комната">
            <div>Код: <button class="room-code" id="online-code" type="button" title="Скопировать код">——</button></div>
            <div class="online-players" id="online-players"></div>
            <div class="online-actions">
                <button class="control-button control-button--gold" id="online-start" type="button">Начать игру</button>
                <button class="control-button" id="online-leave" type="button">Выйти</button>
            </div>
        </section>
        <p class="online-error online-only" id="online-error" role="alert"></p>

        <section class="game-board" aria-label="Игровой стол UNO">
            <div class="opponents" id="opponents" aria-label="Соперники"></div>
            <p class="turn-indicator" id="status" aria-live="polite">Нажми «Новая партия», чтобы начать.</p>

            <div class="table-center">
                <div class="pile">
                    <button class="pile-button" id="draw-pile" type="button" aria-label="Взять карту из колоды" disabled>
                        <span class="uno-card uno-card--back"><span class="uno-card__value">UNO</span></span>
                    </button>
                    <span class="deck-count" id="deck-count">0</span>
                </div>
                <div class="pile" id="discard-pile" aria-label="Верхняя карта сброса"></div>
            </div>

            <div class="player-zone">
                <div class="player-controls">
                    <button class="control-button" id="uno-call" type="button" disabled>Крикнуть UNO!</button>
                    <button class="control-button" id="pass-turn" type="button" disabled>Закончить ход</button>
                    <button class="control-button control-button--gold" id="reveal-hand" type="button" hidden>Показать карты</button>
                </div>
                <div class="player-hand" id="player-hand" aria-label="Твои карты"></div>
            </div>
        </section>
    </main>

    <dialog class="color-dialog" id="color-dialog">
        <h2>Выбери новый цвет</h2>
        <div class="color-options">
            <button class="color-choice" type="button" data-color="red" aria-label="Красный" style="background: var(--red)"></button>
            <button class="color-choice" type="button" data-color="yellow" aria-label="Жёлтый" style="background: var(--yellow)"></button>
            <button class="color-choice" type="button" data-color="green" aria-label="Зелёный" style="background: var(--green)"></button>
            <button class="color-choice" type="button" data-color="blue" aria-label="Синий" style="background: var(--blue)"></button>
        </div>
    </dialog>
    <script>
        if (document.documentElement.classList.contains("online-mode")) {
            if (location.protocol === "file:") {
                const error = document.querySelector("#online-error");
                error.textContent = "Онлайн-режим нужно открыть через GitHub Pages или локальный сервер, а не как file://.";
                document.querySelector("#online-create").disabled = true;
                document.querySelector("#online-join").disabled = true;
            } else {
                import("./uno-multiplayer.js");
            }
        } else {
            const script = document.createElement("script");
            script.src = "uno.js";
            document.body.append(script);
        }
    </script>
</body>
</html>
